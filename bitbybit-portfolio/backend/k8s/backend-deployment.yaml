apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitbybit-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bitbybit
  template:
    metadata:
      labels:
        app: bitbybit
    spec:
      imagePullSecrets:
        - name: ghcr-secret   # applied manually per namespace, never committed
      # FIX: Reduce DNS search overhead for external MongoDB Atlas SRV records
      dnsConfig:
        searches:
          - default.svc.cluster.local
          - svc.cluster.local
          - cluster.local
          - kafka.svc.cluster.local
        options:
          - name: ndots
            value: "5"
      containers:
        - name: bitbybit-backend
          image: bitbybit-backend
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: APP_ENVIRONMENT   # Added for Seq Separation
              valueFrom:
                configMapKeyRef:
                  name: bitbybit-config
                  key: APP_ENVIRONMENT
            - name: SEQ_URL           # Added so Java knows where Seq is
              value: "http://seq-service.default.svc.cluster.local:5341/api/events/raw?clef"
            - name: SPRING_DATA_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: bitbybit-secrets
                  key: mongodb-uri
            - name: SPRING_DATA_MONGODB_DATABASE
              value: "bitbybit"
            - name: UPLOADS_DIR
              value: "/app/uploads/"
            - name: SERVER_PORT
              value: "8080"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "bitbybit-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
            - name: APP_NAME_ENV
              value: "bitbybit-backend"
            - name: LOG_LEVEL
              value: "INFO"
            - name: LOG_LEVEL_3RD_PARTY
              value: "WARN"
          # ADDED: Standard health checks to prevent premature restarts
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
