apiVersion: apps/v1
kind: Deployment
metadata:
  name: seq
  namespace: default
  labels:
    app: seq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seq
  template:
    metadata:
      labels:
        app: seq
    spec:
      containers:
        - name: seq
          image: datalust/seq:latest
          ports:
            - containerPort: 80    # Seq UI
            - containerPort: 5341  # Seq ingestion port
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: SEQ_FIRSTRUN_ADMINPASSWORD
              valueFrom:
                secretKeyRef:
                  name: seq-secrets
                  key: admin-password
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 250m
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: seq-service
  namespace: default
  labels:
    app: seq
spec:
  selector:
    app: seq
  ports:
    - name: ui
      protocol: TCP
      port: 80
      targetPort: 80
    - name: ingestion
      protocol: TCP
      port: 5341
      targetPort: 5341
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seq-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: seq.bitbybit.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seq-service
                port:
                  number: 80